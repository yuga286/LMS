<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        #left-section {
            width: 20%; /* Adjust the width as per your design */
            background-color: #f2f2f2; /* Set background color */
            float: left; /* Float the left section to the left */
            height: 100vh; /* Make the left section full height */
            padding: 20px;
        }

        #main-content {
            /*background-image: url('../static/images/main2.jpg');
            background-size: cover;
            background-position: center;*/
            height: 100vh;  /* Adjust the height as needed */
        }
       
    </style>
</head>

<body>
    <div id="main-content">
        <form method="POST" action="/fetch/">
            {% csrf_token %}
            <div class="form-row">
                <label class="form-row-inner">
                    <input type="text" name="bookname" id="bookname" class="input-text" required>
                    <span class="label">Enter the Book Name</span>
                    <span class="border"></span>
                </label>
            </div>

            <div class="form-row-last">
                <button type="submit" action="/fetch">Search</button>
            </div>
        </form>
    </div>
</body>

</html>
