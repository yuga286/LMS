<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        #left-section {
            width: 20%; /* Adjust the width as per your design */
            background-color: #f2f2f2; /* Set background color */
            float: left; /* Float the left section to the left */
            height: 100vh; /* Make the left section full height */
            padding: 20px;
        }

        #main-content {
            /*background-image: url('../static/images/main2.jpg');
            background-size: cover;
            background-position: center;*/
            height: 100vh;  /* Adjust the height as needed */
        }
       
    </style>
</head>
<body>
   <div id="left-section">

   </div>
    <div id="main-content">
        <!-- Main content of your page goes here -->
        <h1>Main Content</h1>
        {% if book_data %}
            <p>Book Name: {{ book_data["Book_Name"]|default('N/A') }}</p>
            <p>Book Count: {{ book_data["Book_Count"]|default('N/A') }}</p>
        {% else %}
            <p>Book data not found</p>
        {% endif %}
    </div>
</body>
</html>
